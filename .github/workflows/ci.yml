name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# CI runs in MOCK MODE only. No CI runner has the Sui CLI, a testnet wallet,
# a Walrus publisher key, or a Gemini API key — and they should never be added
# as GitHub secrets just to make tests pass. The walrusos in-memory adapters
# cover the full code path that the unit tests verify.
#
# Real-network integration tests live under tests/integration/ and are ignored
# in CI. They are designed to be run manually from a developer machine that
# has the credentials configured.

jobs:
  # ── Required: tests must pass for the badge to be green ────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]
    env:
      WALRUSOS_USE_MOCKS: "1"
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install package + dev extras
        run: |
          uv pip install -e ".[dev]" "pydantic[email]" pytest-cov --system

      - name: Run unit tests (mock mode, integration tests ignored)
        run: |
          pytest tests/ --ignore=tests/integration \
            --tb=short \
            --cov=walrusos \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ── Advisory: lint runs but does not block ────────────────────────────────
  # Will go green once code is run through ruff format + lint cleanup. Left
  # advisory for now so style work doesn't block functional CI.
  lint:
    name: Lint & Format (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install lint tools
        run: uv pip install ruff --system

      - name: ruff check
        run: ruff check walrusos tests || true

      - name: ruff format --check
        run: ruff format --check walrusos tests || true

  # ── Advisory: type check runs but does not block ──────────────────────────
  typecheck:
    name: Type Check (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install type-check tools
        run: uv pip install -e ".[dev]" "pydantic[email]" --system

      - name: mypy
        run: mypy walrusos --ignore-missing-imports || true

  # ── Advisory: security audit runs but does not block ──────────────────────
  security:
    name: Security Audit (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: pip-audit on locked deps
        run: |
          uv pip install pip-audit --system
          uv pip freeze --system > /tmp/frozen.txt
          pip-audit --requirement /tmp/frozen.txt || true

  # ── Optional: benchmark on main push only ─────────────────────────────────
  # Non-blocking. Skips if benchmarks/ requires real adapters.
  benchmark:
    name: Performance Benchmark (advisory)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    continue-on-error: true
    env:
      WALRUSOS_USE_MOCKS: "1"
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install package
        run: uv pip install -e ".[dev]" "pydantic[email]" --system

      - name: Run benchmark suite (mock mode, small)
        run: python benchmarks/bench_suite.py --iterations 1000 --search-corpus 100 || true
