name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# CI runs in MOCK MODE only. No runner has the Sui CLI, a testnet wallet,
# a Walrus publisher key, or a Gemini API key — and they must never be added
# as GitHub secrets just to make tests pass. The walrusos in-memory adapters
# cover the full code path that the unit tests verify.
#
# Real-network integration tests live under tests/integration/ and are
# excluded from CI. Heavy framework integrations (crewai, autogen, openai,
# llama_index, langgraph, pydantic_ai) live in tests/test_integrations.py and
# tests/integrations/test_integrations.py; those modules use pytest.importorskip
# so they skip cleanly when [integrations] extras aren't installed.

jobs:
  # ── Required: test matrix is the gating signal for the badge ──────────────
  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]
    env:
      WALRUSOS_USE_MOCKS: "1"
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run unit tests (mock mode, integration tests ignored)
        run: |
          python -m pytest tests/ --ignore=tests/integration \
            --tb=short \
            --cov=walrusos \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ── Advisory: lint runs but does not block the badge ──────────────────────
  lint:
    name: Lint & Format (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff

      - name: ruff check
        run: ruff check walrusos tests || true

      - name: ruff format --check
        run: ruff format --check walrusos tests || true

  # ── Advisory: type check ───────────────────────────────────────────────────
  typecheck:
    name: Type Check (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package + dev tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: mypy
        run: mypy walrusos --ignore-missing-imports || true

  # ── Advisory: security audit ──────────────────────────────────────────────
  security:
    name: Security Audit (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit

      - name: pip-audit on declared deps
        run: pip-audit --requirement <(python -m pip freeze) || true
        shell: bash

  # ── Optional: benchmark on main push only ─────────────────────────────────
  benchmark:
    name: Performance Benchmark (advisory)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    continue-on-error: true
    env:
      WALRUSOS_USE_MOCKS: "1"
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run benchmark suite (mock mode, small)
        run: python benchmarks/bench_suite.py --iterations 1000 --search-corpus 100 || true
